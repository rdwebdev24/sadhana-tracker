<!DOCTYPE html>
<html>

<head>


     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Sadhana Tracker</title>
   



  <title>Sadhana Tracker</title>
  <style>
   *{
     margin: 0px;
     padding: 0px;
     box-sizing:border-box ;
}

    body {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      height: 100vh;
     
    }
    #container{
      align-self: center;
      height: auto;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 30px;
      gap: 1rem;
      /* border: 2px solid red; */
    }
    #data{
      flex: 1;
      border-radius: 12px;
      /* border: 2px solid red; */
      padding: 0.5rem;

    }
    .box {
      flex: 1;
      /* border: 2px solid red; */
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px #ddd;
      display: flex;
      flex-direction: column;
    }
    input, textarea, button {
     
       width:100%;
       max-width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
   
    button {
      background: #1f4e79;
      color: white;
      border: none;
      border-radius: 6px;
    }
    #records{
      width: 100%;
      /* border: 2px solid red; */
      justify-content: flex-start;
      display: flex;
      flex-wrap: wrap;
      flex-direction: row;
      gap: 1rem;

    }
    .entry {
      width: 18rem;
      background: #eef3f8;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #888;
    }
    .field{
      margin: 10px 0;
    }
@media screen and (max-width: 786px) {
  #container{padding: 0;}
  #records{
    justify-content: center;
  }
 
    
}
   
  </style>
</head>
<body>

<div id="container">

<div class="box">
  <h2>🌿 Sadhana Tracker</h2>
  <input type="date" id="date">
  <label for="location">Location</label>
  <input type="text" id="location" placeholder="Detecting location..." readonly>
  <input type="number" id="rounds" placeholder="Chanting rounds">
  <input type="number" id="reading" placeholder="Reading minutes">
  <input type="number" id="hearing" placeholder="Hearing minutes">
  <label for="wakeTime">wakeup Time</label>
  <input type="time" placeholder="Wake-up time" id="wakeTime">
  <label for="sleepTime">Sleep Time</label>
  <input type="time" placeholder="Sleep time" id="sleepTime">
  <label for="Round_finish_before">Round_finish_before</label>
  <input type="time" placeholder="Round_finish_before" id="Rounds_finish_before">
  <input type="input" placeholder="Seva" id="Seva">
  <button onclick="saveSadhana()">Save</button>
</div>

<div id="data">
  <h3 style="text-align: center; padding: 1rem; font-size: 1.5rem;">Previous Records</h3>
 
  <div id="records"></div>
</div>

</div>

<script>



  document.getElementById("date").valueAsDate = new Date();

  function getLocation() {

    if (!navigator.geolocation) {
        alert("Geolocation is not supported.");
        return;
    }

    navigator.geolocation.getCurrentPosition(async (position) => {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );

        const data = await response.json();

        const city =
            data.address.city ||
            data.address.town ||
            data.address.village ||
            data.address.state_district ||
            "";

        document.getElementById("location").value = city;

    }, () => {
        document.getElementById("location").value = "Location not available";
    });

}

  function saveSadhana() {
    const entry = {
      date: document.getElementById("date").value,
      location: document.getElementById("location").value,
      rounds: document.getElementById("rounds").value,
      Rounds_finish_before: document.getElementById("Rounds_finish_before").value,
      reading: document.getElementById("reading").value,
      hearing: document.getElementById("hearing").value,
      wakeTime: document.getElementById("wakeTime").value,
      sleepTime: document.getElementById("sleepTime").value,
      Seva: document.getElementById("Seva").value,
      
    };

    let data = JSON.parse(localStorage.getItem("sadhanaData")) || [];

    data = data.filter(item => item.date !== entry.date);
    data.push(entry);

    localStorage.setItem("sadhanaData", JSON.stringify(data));

    showRecords();
    alert("Sadhana saved successfully!");
  }

  function showRecords() {
    const recordsDiv = document.getElementById("records");
    const data = JSON.parse(localStorage.getItem("sadhanaData")) || [];

    data.sort((a, b) => new Date(b.date) - new Date(a.date));

    recordsDiv.innerHTML = "";

    data.forEach((item,index) => {
      recordsDiv.innerHTML += `
      <div class="entry">
        <div class="field">📅 Date : ${item.date}</div>
        <div class="field">📍 Location: ${item.location || "Not added"}</div>
        <div class="field">📿 Rounds: ${item.rounds || 0}</div>
        <div class="field">⏰ Rounds finish before: ${item.Rounds_finish_before || "Not added"}</div>
        <div class="field">📖 Reading: ${item.reading || 0} min</div>
        <div class="field">🎧 Hearing: ${item.hearing || 0} min</div>
        <div class="field">🌅 Wake-up: ${item.wakeTime || "Not added"}</div>
        <div class="field">🌙 Sleep Time: ${item.sleepTime || "Not added"}</div>
        <div class="field">🛕 Seva: ${item.Seva || "Not added"}</div>

        <button onclick="sendToWhatsApp(${index})">Send WhatsApp</button>
    </div>

      `;
    });
  }

  function sendToWhatsApp(index) {  
  const data = JSON.parse(localStorage.getItem("sadhanaData")) || [];
  data.sort((a, b) => new Date(b.date) - new Date(a.date));

  const item = data[index];

  const phoneNumber = "918218693241"; // yahan apna number daalo, country code ke saath

  const message =
`Hare krishna Prabhu ji 🙏
🌿 Sadhana Report

📅 Date: ${item.date}
📍Location: ${item.location || "Not added"}
📿Rounds: ${item.rounds || 0}
⏰ Rounds finish before: ${item.Rounds_finish_before || "Not added"}
📖 Reading: ${item.reading || 0} min
🎧 Hearing: ${item.hearing || 0} min
🌅 Wake-up: ${item.wakeTime || "Not added"}
🌙 Sleep Time: ${item.sleepTime || "Not added"}
🛕 Seva: ${item.Seva || "Not added"}`;

  const encodedMessage = encodeURIComponent(message);

  const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;

  window.open(whatsappURL, "_blank");
} 

  showRecords();
  
  // getLocation();
</script>

</body>
</html>
